<!doctype html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Chalkboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 <script src="/_sdk/telemetry_sdk.js"></script></head>
 <body data-template-id="__page-root">
  <div class="chalkboard" id="chalkboard">
   <script id="notes-data" type="application/json"></script>

   <!-- Floating Action Button -->
   <div class="top-bar-shell absolute top-0 left-1/2 z-50 flex justify-center" style="transform: translateX(-50%); width: min(420px, calc(100% - 16px)); margin-top: -1px;">
    <div class="top-bar" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 10px 14px; border-radius: 0 0 18px 18px; background: linear-gradient(135deg, #7a5535 0%, #6a4728 25%, #8b643d 50%, #6a4728 75%, #7a5535 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -2px 6px rgba(0,0,0,0.35), 0 6px 18px rgba(0,0,0,0.42); border: 1px solid rgba(255,255,255,0.16); border-top: 1px solid rgba(255,255,255,0.16); position: relative; overflow: visible;">
     <button data-template-id="add-note-btn" id="add-note-btn" class="canva-button px-6 py-2 rounded-lg font-medium shadow-lg" style="background: rgb(245, 245, 245); color: rgb(26, 26, 26); font-weight: 500; font-style: normal; font-size: 16px;">+ Add Note</button>
    <div class="relative"><button id="colors-trigger" type="button" aria-label="Open color picker" class="canva-button rounded-full font-bold shadow-lg" style="width: 56px; height: 56px; display: inline-flex; align-items: center; justify-content: center; font-size: 24px; line-height: 1; color: #fff; border: none; position: relative; overflow: visible; background: transparent;"> <span id="colors-trigger-outer" style="position:absolute; inset:0; border-radius:999px; background: linear-gradient(135deg, #ffb36b 0%, #ff8c42 50%, #e67e2e 100%); box-shadow: inset 0 1px 1px rgba(255,255,255,0.25), 0 4px 10px rgba(0,0,0,0.18); z-index:0;"></span><span id="colors-trigger-inner" style="position:absolute; inset:10px; border-radius:999px; background: rgba(255,255,255,0.96); box-shadow: 0 0 0 2px rgba(255,255,255,0.45), 0 4px 10px rgba(0,0,0,0.18); z-index:1;"></span><span style="position:relative; z-index:2;">🎨</span></button>
     <div id="colors-dropdown" class="absolute top-full mt-2 hidden flex-col items-center justify-center" style="left: 50%; transform: translateX(-50%); top: calc(100% + 8px); min-width: 176px; padding: 8px; border-radius: 16px; background: linear-gradient(180deg, rgba(122, 85, 53, 0.98) 0%, rgba(106, 71, 40, 0.98) 100%); border: 1px solid rgba(255,255,255,0.18); box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -2px 6px rgba(0,0,0,0.35), 0 10px 22px rgba(0,0,0,0.28); backdrop-filter: blur(6px); z-index: 60; display: none;"><div class="grid grid-cols-4 gap-1.5 place-items-center" style="width: 100%;"> <button class="color-option" data-color="#fff9b1" title="Soft yellow" style="background-color: #fff9b1;"></button> <button class="color-option" data-color="#ffb3ba" title="Soft pink" style="background-color: #ffb3ba;"></button> <button class="color-option" data-color="#baffc9" title="Soft green" style="background-color: #baffc9;"></button> <button class="color-option" data-color="#bae1ff" title="Soft blue" style="background-color: #bae1ff;"></button> <button class="color-option" data-color="#e8baff" title="Soft purple" style="background-color: #e8baff;"></button> <button class="color-option" data-color="#ffd6a5" title="Soft peach" style="background-color: #ffd6a5;"></button> <button class="color-option" data-color="#c8d6ff" title="Soft lavender" style="background-color: #c8d6ff;"></button> <button class="color-option" data-color="#d7f3ff" title="Soft aqua" style="background-color: #d7f3ff;"></button></div>
     </div>
    </div>
   </div>
  </div>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
        lucide.createIcons();

        const board = document.getElementById('chalkboard');
        const colors = ['#fff9b1','#ffb3ba','#baffc9','#bae1ff','#e8baff','#ffd6a5','#c8d6ff','#d7f3ff'];
        const STORAGE_KEY = 'digital-blackboard-notes-v1';
        const DEFAULT_NOTE_TEXT = 'Welcome to your Digital Blackboard. Start writing here.';
        let noteCount = 0;
        let dragState = null;
        let selectedColor = null;

        function getDefaultNote() {
            return {
                id: createId(),
                x: 120,
                y: 96,
                color: colors[0],
                pinned: false,
                content: DEFAULT_NOTE_TEXT
            };
        }

        function loadNotes() {
            try {
                const embedded = document.getElementById('notes-data')?.textContent;
                if (embedded) {
                    const parsed = JSON.parse(embedded);
                    if (Array.isArray(parsed) && parsed.length) {
                        return parsed;
                    }
                }
            } catch (error) {
                console.warn('Unable to parse embedded notes:', error);
            }

            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed)) {
                        return parsed.length ? parsed : [getDefaultNote()];
                    }
                }

                return [getDefaultNote()];
            } catch (error) {
                console.warn('Unable to load saved notes:', error);
                return [getDefaultNote()];
            }
        }

        function saveNotes(notes) {
            const json = JSON.stringify(notes);
            const embedded = document.getElementById('notes-data');
            if (embedded) {
                embedded.textContent = json;
            }
            board.setAttribute('data-notes', json);

            try {
                localStorage.setItem(STORAGE_KEY, json);
            } catch (error) {
                console.warn('Unable to save notes:', error);
            }
        }

        function createId() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                return window.crypto.randomUUID();
            }
            return 'note-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
        }

        function getNotesState() {
            return Array.from(board.querySelectorAll('.sticky-note')).map((note) => ({
                id: note.dataset.noteId,
                x: parseFloat(note.style.left || '0'),
                y: parseFloat(note.style.top || '0'),
                width: note.offsetWidth || parseFloat(note.style.width || '0'),
                height: note.offsetHeight || parseFloat(note.style.height || '0'),
                color: note.style.background || selectedColor || colors[0],
                pinned: note.classList.contains('pinned'),
                textAlign: note.querySelector('.note-content')?.style.textAlign || 'left',
                content: note.querySelector('.note-content')?.innerHTML || ''
            }));
        }

        function persistNotes() {
            saveNotes(getNotesState());
        }

        document.getElementById('add-note-btn').addEventListener('click', () => {
            const note = createNote(100 + (noteCount % 5) * 30, 80 + (noteCount % 5) * 30);
            board.appendChild(note);
            persistNotes();
        });

        const colorsTrigger = document.getElementById('colors-trigger');
        const colorsDropdown = document.getElementById('colors-dropdown');

        function closeDropdownMenus(target = null) {
            document.querySelectorAll('.note-font-size-menu').forEach((menu) => {
                const trigger = menu.previousElementSibling;
                if (menu && (!target || (!menu.contains(target) && !trigger?.contains(target)))) {
                    menu.classList.add('hidden');
                    trigger?.classList.remove('active');
                }
            });

            document.querySelectorAll('.note-list-menu').forEach((menu) => {
                const trigger = menu.previousElementSibling;
                if (menu && (!target || (!menu.contains(target) && !trigger?.contains(target)))) {
                    menu.classList.add('hidden');
                    trigger?.classList.remove('active');
                }
            });

            document.querySelectorAll('.note-color-picker').forEach((picker) => {
                const trigger = picker.previousElementSibling;
                if (picker && (!target || (!picker.contains(target) && !trigger?.contains(target)))) {
                    picker.classList.add('hidden');
                }
            });
        }

        document.addEventListener('mousedown', (event) => {
            const target = event.target;
            const shouldIgnore = target.closest('.note-format-tools') || target.closest('.note-actions') || target.closest('#colors-dropdown');
            if (!shouldIgnore) {
                closeDropdownMenus(target);
                hideColorsDropdown();
            }
        });

        function showColorsDropdown() {
            colorsDropdown.classList.remove('hidden');
            colorsDropdown.style.display = 'flex';
        }

        function hideColorsDropdown() {
            colorsDropdown.classList.add('hidden');
            colorsDropdown.style.display = 'none';
        }

        colorsTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (colorsDropdown.style.display === 'flex') {
                hideColorsDropdown();
            } else {
                showColorsDropdown();
            }
        });

        colorsTrigger.addEventListener('mouseenter', () => {
            showColorsDropdown();
        });

        colorsTrigger.addEventListener('mouseleave', () => {
            setTimeout(() => {
                if (!colorsDropdown.matches(':hover')) {
                    hideColorsDropdown();
                }
            }, 80);
        });

        colorsDropdown.addEventListener('mouseenter', () => {
            colorsDropdown.style.display = 'flex';
        });

        colorsDropdown.addEventListener('mouseleave', () => {
            hideColorsDropdown();
        });

        document.addEventListener('click', (e) => {
            if (!colorsTrigger.contains(e.target) && !colorsDropdown.contains(e.target)) {
                hideColorsDropdown();
            }
            if (!e.target.closest('.note-format-tools') && !e.target.closest('.note-actions')) {
                closeDropdownMenus(e.target);
            }
        });

        function updateColorPickerButton(color) {
            document.getElementById('colors-trigger-outer').style.background = color;
            document.getElementById('colors-trigger-outer').style.boxShadow = 'inset 0 1px 1px rgba(255,255,255,0.25), 0 6px 14px rgba(0,0,0,0.25)';
            document.getElementById('colors-trigger-inner').style.boxShadow = '0 0 0 3px rgba(255,255,255,0.55), 0 4px 10px rgba(0,0,0,0.18)';
        }

        document.querySelectorAll('.color-option').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedColor = btn.dataset.color;
                updateColorPickerButton(selectedColor);
                hideColorsDropdown();
            });
        });

        updateColorPickerButton(selectedColor || '#ffb36b');

        function createNote(x, y, existingNote = null) {
            const note = document.createElement('div');
            note.className = 'sticky-note';
            note.dataset.noteId = existingNote?.id || createId();
            note.style.background = existingNote?.color || selectedColor || colors[noteCount % colors.length];
            note.style.left = (existingNote?.x ?? x) + 'px';
            note.style.top = (existingNote?.y ?? y) + 'px';
            note.style.width = existingNote?.width ? `${existingNote.width}px` : '260px';
            note.style.height = existingNote?.height ? `${existingNote.height}px` : '220px';
            note.style.zIndex = ++noteCount;

            if (existingNote?.pinned) {
                note.classList.add('pinned');
            }

            const formatTools = document.createElement('div');
            formatTools.className = 'note-format-tools';

            const boldBtn = document.createElement('button');
            boldBtn.type = 'button';
            boldBtn.className = 'note-icon-btn';
            boldBtn.title = 'Toggle bold';
            boldBtn.innerHTML = 'B';
            const syncFormatState = () => {
                const canUseCommandState = typeof document.queryCommandState === 'function';
                boldBtn.classList.toggle('active', canUseCommandState && document.queryCommandState('bold'));
                italicBtn.classList.toggle('active', canUseCommandState && document.queryCommandState('italic'));
            };
            boldBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                content.focus();
                document.execCommand('bold');
                syncFormatState();
                persistNotes();
            });

            const italicBtn = document.createElement('button');
            italicBtn.type = 'button';
            italicBtn.className = 'note-icon-btn';
            italicBtn.title = 'Toggle italic';
            italicBtn.innerHTML = 'I';
            italicBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                content.focus();
                document.execCommand('italic');
                syncFormatState();
                persistNotes();
            });

            const alignBtn = document.createElement('button');
            alignBtn.type = 'button';
            alignBtn.className = 'note-icon-btn';
            alignBtn.title = 'Choose alignment';
            alignBtn.innerHTML = '↹';

            const alignMenu = document.createElement('div');
            alignMenu.className = 'note-list-menu hidden';
            const alignOptions = [
                { label: 'Left', value: 'left', command: 'justifyLeft' },
                { label: 'Center', value: 'center', command: 'justifyCenter' },
                { label: 'Right', value: 'right', command: 'justifyRight' }
            ];

            alignOptions.forEach((option) => {
                const alignOption = document.createElement('button');
                alignOption.type = 'button';
                alignOption.className = 'note-font-size-option';
                alignOption.textContent = option.label;
                alignOption.style.fontSize = '14px';
                alignOption.addEventListener('click', (e) => {
                    e.stopPropagation();
                    content.focus();
                    document.execCommand(option.command);
                    content.style.textAlign = option.value;
                    alignBtn.classList.add('active');
                    alignMenu.classList.add('hidden');
                    persistNotes();
                });
                alignMenu.appendChild(alignOption);
            });

            alignBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isHidden = alignMenu.classList.contains('hidden');
                alignMenu.classList.toggle('hidden', !isHidden);
                alignBtn.classList.toggle('active', isHidden);
                content.focus();
            });

            const listBtn = document.createElement('button');
            listBtn.type = 'button';
            listBtn.className = 'note-icon-btn';
            listBtn.title = 'Bullet style';
            listBtn.innerHTML = '•';

            const listMenu = document.createElement('div');
            listMenu.className = 'note-list-menu hidden';
            ['●', '○', '~'].forEach((marker) => {
                const option = document.createElement('button');
                option.type = 'button';
                option.className = 'note-font-size-option';
                option.textContent = marker;
                option.style.fontSize = '16px';
                option.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const selection = window.getSelection();
                    if (!selection || selection.rangeCount === 0) {
                        content.focus();
                        document.execCommand('insertText', false, `${marker} `);
                        listMenu.classList.add('hidden');
                        listBtn.classList.remove('active');
                        persistNotes();
                        return;
                    }
                    const text = selection.toString();
                    const converted = text
                        .split(/\r?\n/)
                        .map((line) => {
                            const trimmed = line.trim();
                            if (/^[-*●○~]\s+/.test(trimmed)) {
                                return `${marker} ${trimmed.replace(/^[-*●○~]\s+/, '')}`;
                            }
                            return line;
                        })
                        .join('\n');
                    document.execCommand('insertText', false, converted);
                    listMenu.classList.add('hidden');
                    listBtn.classList.remove('active');
                    persistNotes();
                });
                listMenu.appendChild(option);
            });

            listBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const open = listMenu.classList.contains('hidden');
                listMenu.classList.toggle('hidden', !open);
                listBtn.classList.toggle('active', open);
                content.focus();
            });

            const fontSizeBtn = document.createElement('button');
            fontSizeBtn.type = 'button';
            fontSizeBtn.className = 'note-icon-btn';
            fontSizeBtn.title = 'Choose font size';
            fontSizeBtn.innerHTML = 'A+';

            const fontSizeMenu = document.createElement('div');
            fontSizeMenu.className = 'note-font-size-menu hidden';
            const fontSizes = [12, 14, 16, 18, 20, 24, 28, 32];
            fontSizes.forEach((size) => {
                const option = document.createElement('button');
                option.type = 'button';
                option.className = 'note-font-size-option';
                option.textContent = `${size}px`;
                option.style.fontSize = `${size}px`;
                option.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const selection = window.getSelection();
                    if (!selection || selection.rangeCount === 0) {
                        content.focus();
                        fontSizeMenu.classList.add('hidden');
                        return;
                    }

                    const range = selection.getRangeAt(0);
                    if (range.collapsed) {
                        content.focus();
                        fontSizeMenu.classList.add('hidden');
                        return;
                    }

                    const fragment = range.extractContents();
                    const wrapper = document.createElement('span');
                    wrapper.style.fontSize = `${size}px`;
                    wrapper.appendChild(fragment);
                    range.insertNode(wrapper);
                    selection.removeAllRanges();
                    const newRange = document.createRange();
                    newRange.selectNodeContents(wrapper);
                    selection.addRange(newRange);
                    fontSizeMenu.classList.add('hidden');
                    fontSizeBtn.classList.add('active');
                    persistNotes();
                });
                fontSizeMenu.appendChild(option);
            });

            fontSizeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isHidden = fontSizeMenu.classList.contains('hidden');
                fontSizeMenu.classList.toggle('hidden', !isHidden);
                fontSizeBtn.classList.toggle('active', isHidden);
                content.focus();
            });

            formatTools.appendChild(boldBtn);
            formatTools.appendChild(italicBtn);
            formatTools.appendChild(alignBtn);
            formatTools.appendChild(alignMenu);
            formatTools.appendChild(listBtn);
            formatTools.appendChild(listMenu);
            formatTools.appendChild(fontSizeBtn);
            formatTools.appendChild(fontSizeMenu);

            const noteActions = document.createElement('div');
            noteActions.className = 'note-actions';

            const pin = document.createElement('button');
            pin.type = 'button';
            pin.className = 'note-icon-btn pin-btn';
            if (existingNote?.pinned) {
                pin.classList.add('active');
            }
            pin.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 2h6l-1 7h4l-7 8-7-8h4z"/></svg>';
            pin.title = 'Pin/Unpin';
            pin.addEventListener('click', (e) => {
                e.stopPropagation();
                note.classList.toggle('pinned');
                pin.classList.toggle('active');
                persistNotes();
            });

            const colorBtn = document.createElement('button');
            colorBtn.type = 'button';
            colorBtn.className = 'note-icon-btn';
            colorBtn.title = 'Change note color';
            colorBtn.style.background = 'rgba(255, 255, 255, 0.82)';
            colorBtn.style.color = '#555';
            colorBtn.style.border = '1px solid rgba(255, 255, 255, 0.85)';
            colorBtn.style.boxShadow = '0 2px 6px rgba(0, 0, 0, 0.12)';
            colorBtn.innerHTML = '🎨';
            colorBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                colorPicker.classList.toggle('hidden');
            });

            const colorPicker = document.createElement('div');
            colorPicker.className = 'note-color-picker hidden';
            colors.forEach((color) => {
                const swatch = document.createElement('button');
                swatch.type = 'button';
                swatch.className = 'note-color-swatch';
                swatch.title = 'Use this color';
                swatch.style.backgroundColor = color;
                swatch.addEventListener('click', (e) => {
                    e.stopPropagation();
                    note.style.background = color;
                    colorBtn.style.background = color;
                    colorPicker.classList.add('hidden');
                    persistNotes();
                });
                colorPicker.appendChild(swatch);
            });

            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'note-icon-btn delete-btn';
            deleteBtn.title = 'Delete note';
            deleteBtn.innerHTML = '🗑️';
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const shouldDelete = window.confirm('Delete this sticky note?');
                if (!shouldDelete) {
                    return;
                }
                note.remove();
                persistNotes();
            });

            noteActions.appendChild(pin);
            noteActions.appendChild(colorBtn);
            noteActions.appendChild(colorPicker);
            noteActions.appendChild(deleteBtn);

            const content = document.createElement('div');
            content.className = 'note-content';
            content.contentEditable = 'true';
            content.setAttribute('placeholder', 'Type here...');
            content.innerHTML = existingNote?.content || '';
            content.style.textAlign = existingNote?.textAlign || 'left';
            content.addEventListener('mousedown', (e) => e.stopPropagation());
            content.addEventListener('mouseup', () => syncFormatState());
            content.addEventListener('keyup', () => {
                syncFormatState();
                persistNotes();
            });
            content.addEventListener('input', () => {
                syncFormatState();
                persistNotes();
            });
            content.addEventListener('paste', (e) => {
                const items = e.clipboardData.items;
                for (const item of items) {
                    if (item.type.startsWith('image/')) {
                        e.preventDefault();
                        const blob = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const img = document.createElement('img');
                            img.src = ev.target.result;
                            content.appendChild(img);
                            persistNotes();
                        };
                        reader.readAsDataURL(blob);
                        return;
                    }
                }
            });

            note.appendChild(formatTools);
            note.appendChild(noteActions);
            note.appendChild(content);
            board.appendChild(note);

            note.addEventListener('mousedown', (e) => {
                if (note.classList.contains('pinned')) return;
                if (e.target.closest('.note-format-tools') || e.target.closest('.note-actions')) return;
                note.style.zIndex = ++noteCount;
                note.classList.add('dragging');
                dragState = { el: note, offsetX: e.clientX - note.offsetLeft, offsetY: e.clientY - note.offsetTop };
            });

            return note;
        }

        function restoreNotes() {
            const savedNotes = loadNotes();
            savedNotes.forEach((savedNote) => {
                const note = createNote(savedNote.x, savedNote.y, savedNote);
                board.appendChild(note);
            });
        }

        document.addEventListener('mousemove', (e) => {
            if (!dragState) return;
            dragState.el.style.left = (e.clientX - dragState.offsetX) + 'px';
            dragState.el.style.top = (e.clientY - dragState.offsetY) + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (dragState) {
                dragState.el.classList.remove('dragging');
                persistNotes();
                dragState = null;
            }
        });

        restoreNotes();
    </script>
